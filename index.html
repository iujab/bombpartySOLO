<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomb Party - Single Player</title>
    <link rel="icon" href="assets/bomb.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="particle-canvas" class="particle-canvas" aria-hidden="true"></canvas>

    <header class="top-bar">
        <div id="lives-container" class="lives-container" role="status" aria-live="polite" aria-label="Lives remaining"></div>
        <div class="top-bar-center"></div>
        <div class="top-bar-right">
            <button id="sound-btn" class="sound-btn" aria-label="Toggle sound">
                <svg xmlns="http://www.w3.org/2000/svg" class="sound-icon sound-icon--on" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a8 8 0 010 11.9M6.5 8.788V15.212a1 1 0 00.553.894l4.553 2.277A1 1 0 0013 17.618V6.382a1 1 0 00-1.394-.894L7.053 7.765A1 1 0 006.5 8.659z" />
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" class="sound-icon sound-icon--off" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707A1 1 0 0112 5.586v12.828a1 1 0 01-1.707.707L5.586 15z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                </svg>
            </button>
        </div>
    </header>

    <main class="main-stage">
        <div id="bomb-container" class="bomb-container">
            <img src="assets/bomb.svg" alt="Bomb" class="bomb-image" />
            <div class="bomb-text">
                <h1 id="substring-display" class="substring-display text-shadow" role="status" aria-live="polite">...</h1>
            </div>
        </div>
        <div id="missed-words" class="missed-words"></div>
    </main>

    <aside id="control-panel" class="control-panel">
        <h2 class="control-heading">BOMB PARTY</h2>

        <div class="control-group">
            <p class="control-label">DIFFICULTY</p>
            <div class="difficulty-grid">
                <button data-difficulty="easy" class="control-btn">EASY <span class="difficulty-note">500+</span></button>
                <button data-difficulty="medium" class="control-btn">MED <span class="difficulty-note">100+</span></button>
                <button data-difficulty="hard" class="control-btn">HARD <span class="difficulty-note">20+</span></button>
                <button data-difficulty="expert" class="control-btn">EXPERT <span class="difficulty-note">1+</span></button>
            </div>
        </div>
        <button id="start-game-btn" class="start-btn" disabled>LOADING...</button>

        <div class="control-divider"></div>

        <div id="game-over-section" class="game-over-section hidden">
            <div class="game-over-banner">GAME OVER</div>
            <div class="game-over-inline-stats">
                <div class="go-stat"><span>Words</span><span id="final-words">0</span></div>
                <div class="go-stat"><span>Avg WPM</span><span id="final-wpm">0</span></div>
                <div class="go-stat"><span>Best Value</span><span id="final-best-value">0</span></div>
            </div>
            <div id="new-high-score-badge" class="new-high-score-badge hidden">NEW BEST</div>
            <button id="play-again-btn" class="start-btn">PLAY AGAIN</button>
            <div class="control-divider"></div>
        </div>

        <div class="word-history-section">
            <p class="control-label">WORD LOG</p>
            <div class="word-history-header">
                <span>WORD</span>
                <span>TIME</span>
                <span>LEN</span>
                <span>VAL</span>
                <span>WPM</span>
            </div>
            <div class="word-history-wrapper">
                <div id="word-history" class="word-history"></div>
            </div>
        </div>

        <div class="control-divider"></div>

        <div id="stats-panel" class="stats-panel">
            <p class="control-label">ALL-TIME STATS</p>
            <div class="stats-grid">
                <div class="stat-item"><span>Best WPM</span><span id="stat-best-wpm">0</span></div>
                <div class="stat-item"><span>Longest Streak</span><span id="stat-longest-streak">0</span></div>
                <div class="stat-item"><span>Total Words</span><span id="stat-total-words">0</span></div>
                <div class="stat-item"><span>Most Words</span><span id="stat-longest">0</span></div>
            </div>
        </div>
    </aside>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <section class="bottom-controls">
        <div id="timer-bar-container" class="timer-bar-container" role="timer" aria-label="Time remaining">
            <div id="timer-bar-inner" class="timer-bar-inner"></div>
        </div>

        <form id="word-form" class="word-form" autocomplete="off">
            <div class="word-input-container">
                <div id="word-preview-overlay" class="word-preview-overlay"></div>
                <input
                    type="text"
                    id="word-input"
                    class="word-input"
                    inputmode="text"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                    disabled
                    aria-label="Enter a word"
                >
            </div>
        </form>

        <div id="alphabet-container" class="alphabet-container"></div>
    </section>

    <script src="script.js" defer></script>
</body>
</html>
